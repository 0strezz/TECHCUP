name: Java CI/CD with Spring Boot and Azure

on:
  pull_request:
    [cite_start]branches: [ "develop", "main" ] [cite: 258]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        [cite_start]run: mvn compile [cite: 260]

  test:
    [cite_start]needs: build [cite: 261, 264]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        [cite_start]run: mvn verify [cite: 262]

  deploy:
    [cite_start]needs: test [cite: 264, 265]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Status Message
        [cite_start]run: echo "En construcción..." [cite: 265]
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Package
        run: mvn clean package -DskipTests
      - name: Deploy to Azure
        [cite_start]uses: azure/webapps-deploy@v2 [cite: 268]
        with:
          app-name: 'TU_APP_SERVICE_NAME'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          [cite_start]package: target/*.jar [cite: 268]